<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nikas Lukyanov</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=PT+Sans:ital,wght@0,400;0,700;1,400&family=PT+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    /* poole */
    *, *::before, *::after { -webkit-box-sizing: border-box; -moz-box-sizing: border-box; box-sizing: border-box; }
    html, body { margin: 0; padding: 0; overflow-x: hidden; }
    html { font-family: "PT Serif", Georgia, "Times New Roman", serif; font-size: 16px; line-height: 1.5; }
    @media (min-width: 38em) { html { font-size: 20px; } }
    body { color: #515151; background-color: #fff; -webkit-text-size-adjust: 100%; }
    a { color: #268bd2; text-decoration: none; }
    a:hover, a:focus { text-decoration: underline; }
    h1, h2, h3, h4, h5, h6 {
      font-family: "PT Sans", Helvetica, Arial, sans-serif;
      font-weight: 400; color: #313131;
      letter-spacing: -.025rem; margin-bottom: .5rem;
      line-height: 1.25; text-rendering: optimizeLegibility;
    }
    h1 { font-size: 2rem; }
    h2 { margin-top: 1rem; font-size: 1.5rem; }
    h3 { margin-top: 1.5rem; font-size: 1.25rem; }
    p { margin-top: 0; margin-bottom: 1rem; }
    hr { position: relative; margin: 1.5rem 0; border: 0; border-top: 1px solid #eee; border-bottom: 1px solid #fff; }
    ul, ol { margin-top: 0; margin-bottom: 1rem; }

    /* layout */
    .wrap { position: relative; width: 100%; }
    .container { max-width: 28rem; padding-left: 1rem; padding-right: 1rem; margin-left: auto; margin-right: auto; }
    @media (min-width: 38em) { .container { max-width: 32rem; } }
    @media (min-width: 56em) { .container { max-width: 38rem; } }

    /* masthead */
    .masthead { padding-top: 1rem; padding-bottom: 1rem; margin-bottom: 3rem; border-bottom: 1px solid #eee; }
    .masthead-title { margin-top: 0; margin-bottom: 0; color: #505050; }
    .masthead-title a { color: #505050; }
    .masthead-title small { font-size: 75%; font-weight: 400; color: #c0c0c0; letter-spacing: 0; }
    @media (max-width: 48em) { .masthead-title { text-align: center; } .masthead-title small { display: none; } }

    /* sidebar */
    .sidebar {
      position: fixed; top: 0; bottom: 0; left: -14rem; width: 14rem;
      visibility: hidden; overflow-y: auto;
      font-family: "PT Sans", Helvetica, Arial, sans-serif; font-size: .875rem;
      color: rgba(255,255,255,.6); background-color: #202020;
      -webkit-transition: all .3s ease-in-out; transition: all .3s ease-in-out;
    }
    @media (min-width: 30em) { .sidebar { font-size: .75rem; } }
    .sidebar a { font-weight: normal; color: #fff; }
    .sidebar-item { padding: 1rem; }
    .sidebar-item p:last-child { margin-bottom: 0; }
    .sidebar-nav { border-bottom: 1px solid rgba(255,255,255,.1); }
    .sidebar-nav-item { display: block; padding: .5rem 1rem; border-top: 1px solid rgba(255,255,255,.1); }
    a.sidebar-nav-item:hover, a.sidebar-nav-item:focus { text-decoration: none; background-color: rgba(255,255,255,.1); border-color: transparent; }
    @media (min-width: 48em) { .sidebar-item { padding: 1.5rem; } .sidebar-nav-item { padding-left: 1.5rem; padding-right: 1.5rem; } }

    /* toggle */
    .sidebar-checkbox { position: absolute; opacity: 0; -webkit-user-select: none; -moz-user-select: none; user-select: none; }
    .sidebar-toggle {
      position: absolute; top: .8rem; left: 1rem;
      display: flex; align-items: center; padding: .25rem .75rem;
      color: #505050; background-color: #fff; border-radius: .25rem; cursor: pointer;
    }
    .sidebar-toggle::before {
      display: inline-block; width: 32px; height: 32px; content: "";
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 16 16' fill='%23555' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath fill-rule='evenodd' d='M2.5 11.5A.5.5 0 013 11h10a.5.5 0 010 1H3a.5.5 0 01-.5-.5zm0-4A.5.5 0 013 7h10a.5.5 0 010 1H3a.5.5 0 01-.5-.5zm0-4A.5.5 0 013 3h10a.5.5 0 010 1H3a.5.5 0 01-.5-.5z' clip-rule='evenodd'/%3E%3C/svg%3E") no-repeat;
    }
    .sidebar-toggle:active, #sidebar-checkbox:focus ~ .sidebar-toggle, #sidebar-checkbox:checked ~ .sidebar-toggle { color: #fff; background-color: #555; }
    .sidebar-toggle:active::before, #sidebar-checkbox:focus ~ .sidebar-toggle::before, #sidebar-checkbox:checked ~ .sidebar-toggle::before {
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 16 16' fill='%23fff' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath fill-rule='evenodd' d='M2.5 11.5A.5.5 0 013 11h10a.5.5 0 010 1H3a.5.5 0 01-.5-.5zm0-4A.5.5 0 013 7h10a.5.5 0 010 1H3a.5.5 0 01-.5-.5zm0-4A.5.5 0 013 3h10a.5.5 0 010 1H3a.5.5 0 01-.5-.5z' clip-rule='evenodd'/%3E%3C/svg%3E") no-repeat;
    }
    @media (min-width: 30.1em) { .sidebar-toggle { position: fixed; } }

    /* slide */
    .wrap, .sidebar, .sidebar-toggle { -webkit-backface-visibility: hidden; backface-visibility: hidden; }
    .wrap, .sidebar-toggle { -webkit-transition: -webkit-transform .3s ease-in-out; transition: transform .3s ease-in-out; }
    #sidebar-checkbox:checked + .sidebar { z-index: 10; visibility: visible; }
    #sidebar-checkbox:checked ~ .sidebar,
    #sidebar-checkbox:checked ~ .wrap,
    #sidebar-checkbox:checked ~ .sidebar-toggle {
      -webkit-transform: translateX(14rem); -ms-transform: translateX(14rem); transform: translateX(14rem);
    }

    /* content */
    .page { margin-bottom: 4em; }
    .page-title { margin-top: 0; color: #303030; }
    .post-date { display: block; margin-top: -.5rem; margin-bottom: 1rem; color: #9a9a9a; font-size: .85rem; }

    /* sections */
    .section { display: none; }
    .section.active { display: block; }

    /* project list */
    .project-list { list-style: none; padding: 0; margin: 0; }
    .project-list li { border-top: 1px solid #eee; padding: 1rem 0; }
    .project-list li:last-child { border-bottom: 1px solid #eee; }
    .project-list a { color: #313131; font-size: 1.1rem; }
    .project-list a:hover { color: #268bd2; text-decoration: none; }
  </style>
</head>
<body>

<input type="checkbox" class="sidebar-checkbox" id="sidebar-checkbox">

<div class="sidebar">
  <div class="sidebar-item">
    <p>Nikas Lukyanov</p>
  </div>
  <nav class="sidebar-nav">
    <a class="sidebar-nav-item" href="#" onclick="show('about')">About</a>
    <a class="sidebar-nav-item" href="#" onclick="show('research')">Research</a>
    <a class="sidebar-nav-item" href="#" onclick="show('projects')">Projects</a>
  </nav>
</div>

<label class="sidebar-toggle" for="sidebar-checkbox"></label>

<div class="wrap">
  <div class="masthead">
    <div class="container">
      <h3 class="masthead-title">
        <a href="#" onclick="show('about')">Nikas Lukyanov</a>
      </h3>
    </div>
  </div>

  <div class="container content">

    <div id="about" class="section page active">
      <h1 class="page-title">About</h1>
      <p></p>
    </div>

    <div id="research" class="section page">
      <h1 class="page-title">Research</h1>
      <p></p>
    </div>

    <div id="projects" class="section page">
      <h1 class="page-title">Projects</h1>
      <ul class="project-list">
        <li><a href="https://github.com/nikaslukyanov/Interactive-Tokamak-Simulator" target="_blank">Plasma Optimization</a></li>
        <li><a href="https://github.com/nikaslukyanov" target="_blank">Plasma Streamlit</a></li>
        <li><a href="https://github.com/Oren-H/AI-Advisor" target="_blank">Course Advisor</a></li>
      </ul>
    </div>

  </div>
</div>

<script>
  function show(id) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.getElementById('sidebar-checkbox').checked = false;
    return false;
  }
</script>

</body>
</html>
